<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍕 피자 가게 사장님</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Color+Emoji&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#fdf6ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem 0 2rem;}
.temo,.qdot,.sicon,.npop,.tcard,.cname,.step-title,.sbtn,.bbtn,.ptitle,.corder{font-family:'Noto Color Emoji','Noto Sans KR',sans-serif;}
h1{font-family:'Gaegu',cursive;font-size:2rem;color:#c2410c;letter-spacing:-.01em;margin-bottom:.5rem;}
#hud{display:flex;gap:12px;font-size:13px;font-weight:500;padding:7px 16px;border-radius:20px;background:#fff;border:1.5px solid #fed7aa;box-shadow:0 2px 8px #f9731620;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
#tab-row{display:flex;gap:6px;margin-bottom:10px;}
.tab{font-size:13px;padding:7px 20px;border-radius:20px;cursor:pointer;border:1.5px solid #fed7aa;background:#fff;color:#c2410c;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
.tab.on{background:#c2410c;color:#fff;border-color:#c2410c;}
#game-view{width:100%;display:flex;justify-content:center;}
#shop-view{width:100%;max-width:680px;padding:0 12px;display:none;}
#main{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
#left{width:216px;display:flex;flex-direction:column;gap:8px;}
.panel{border-radius:14px;border:1.5px solid #fed7aa;padding:11px;background:#fff;box-shadow:0 2px 6px #f9731610;}
.ptitle{font-size:11px;font-weight:700;color:#c2410c;margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;}
.ccard{border-radius:10px;border:1.5px solid #fed7aa;padding:9px;background:#fff;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}
.cname{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:5px;color:#1e293b;}
.nbadge{font-size:9px;font-weight:700;background:#dcfce7;color:#15803d;padding:1px 6px;border-radius:20px;animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(0);}65%{transform:scale(1.25);}100%{transform:scale(1);}}
.corder{font-size:11.5px;border-radius:8px;padding:7px 9px;line-height:2.1;background:#fff7ed;}
.crow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.clabel{font-weight:700;color:#c2410c;min-width:28px;font-size:11px;}
.tpill{display:inline-flex;align-items:center;gap:2px;background:#fff;border:1px solid #fed7aa;border-radius:5px;padding:0 6px;font-size:11px;color:#7c2d12;margin:1px 2px;}
.tbar-wrap{margin-top:7px;}
.tbar-lbl{font-size:10px;color:#94a3b8;display:flex;justify-content:space-between;margin-bottom:3px;}
.tbar-bg{height:6px;border-radius:3px;background:#f1f5f9;}
.tbar{height:6px;border-radius:3px;transition:width .5s,background .5s;}
.queue-row{display:flex;gap:5px;flex-wrap:wrap;min-height:28px;}
.qdot{font-size:24px;}
.qdot.newq{animation:bounceIn .3s ease;}
@keyframes bounceIn{0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}}
#pizza-display{position:relative;width:184px;height:184px;margin:0 auto;}
#pc{border-radius:50%;display:block;box-shadow:0 4px 16px #c2410c30;}
#tl{position:absolute;top:0;left:0;width:184px;height:184px;pointer-events:none;}
#right{display:flex;flex-direction:column;align-items:center;gap:8px;}
#steps{display:flex;flex-direction:column;gap:7px;width:100%;max-width:316px;}
.step{border-radius:12px;border:1.5px solid #fed7aa;padding:9px 11px;background:#fff;transition:opacity .2s,border-color .2s;box-shadow:0 1px 4px #f9731610;}
.step.locked{opacity:.35;pointer-events:none;}
.step.active{border-color:#f97316;box-shadow:0 0 0 3px #fed7aa60;}
.step.done{opacity:.6;}
.step-head{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.step-num{width:22px;height:22px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94a3b8;flex-shrink:0;transition:all .2s;}
.step.active .step-num{background:#f97316;color:#fff;}
.step.done .step-num{background:#22c55e;color:#fff;}
.step-title{font-size:12px;font-weight:700;color:#1e293b;}
.step-body{display:flex;gap:5px;flex-wrap:wrap;}
.sbtn,.bbtn{font-size:11px;padding:5px 10px;border-radius:20px;cursor:pointer;border:1.5px solid #fed7aa;background:#fff;color:#7c2d12;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .1s;}
.sbtn:hover,.bbtn:hover{background:#fff7ed;}
.sbtn.active{background:#fef3c7;border-color:#f59e0b;color:#92400e;font-weight:700;}
.bbtn.active{background:#fff7ed;border-color:#f97316;color:#9a3412;font-weight:700;}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;border-radius:10px;cursor:pointer;position:relative;min-width:54px;border:1.5px solid #fed7aa;background:#fff;transition:all .1s;}
.tbtn:hover{background:#fff7ed;transform:scale(1.04);}
.tbtn:active{transform:scale(.93);}
.temo{font-size:18px;line-height:1;}
.tname{font-size:9px;color:#94a3b8;font-weight:500;}
.tcnt{position:absolute;top:2px;right:3px;font-size:10px;font-weight:700;color:#16a34a;}
.tremove{position:absolute;top:2px;left:3px;font-size:9px;color:#dc2626;font-weight:700;cursor:pointer;}
#action-row{display:flex;gap:8px;width:100%;max-width:316px;}
#serve-btn{flex:1;font-size:13px;font-weight:700;padding:10px;border:none;border-radius:20px;background:#d1d5db;color:#fff;cursor:not-allowed;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
#serve-btn.ready{background:#16a34a;cursor:pointer;box-shadow:0 3px 10px #16a34a40;}
#serve-btn.ready:hover{background:#15803d;transform:scale(1.02);}
#rst-btn{font-size:12px;padding:10px 14px;border-radius:20px;cursor:pointer;border:1.5px solid #fed7aa;background:#fff;color:#7c2d12;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
#msg{font-size:12px;font-weight:700;min-height:22px;text-align:center;padding:4px 12px;border-radius:20px;}

/* shop */
.shop-sec-title{font-size:12px;font-weight:700;color:#c2410c;margin:16px 0 9px;letter-spacing:.03em;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;}
.scard{border-radius:12px;border:1.5px solid #fed7aa;padding:11px;display:flex;flex-direction:column;gap:5px;background:#fff;box-shadow:0 1px 4px #f9731610;}
.scard.owned{border-color:#16a34a;}
.scard.cant{opacity:.45;}
.sicon{font-size:26px;line-height:1;}
.sname{font-size:12px;font-weight:700;color:#1e293b;}
.sdesc{font-size:11px;line-height:1.5;color:#64748b;}
.sbuy{font-size:11px;font-weight:700;padding:6px 8px;border:none;border-radius:20px;cursor:pointer;margin-top:auto;font-family:'Noto Sans KR',sans-serif;}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:4px;}
.tcard{border-radius:12px;border:2px solid transparent;padding:10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;align-items:center;box-shadow:0 1px 4px #00000012;}
.tcard:hover{transform:scale(1.04);}
.tcard-name{font-size:12px;font-weight:700;}
.tcard-tag{font-size:10px;opacity:.6;}

.notif-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;}
.npop{font-size:13px;font-weight:700;padding:7px 18px;border-radius:20px;color:#fff;white-space:nowrap;animation:npopAnim 2.2s ease forwards;box-shadow:0 4px 14px #00000030;}
@keyframes npopAnim{0%{opacity:0;transform:translateY(-10px) scale(.9);}15%{opacity:1;transform:translateY(0) scale(1);}78%{opacity:1;}100%{opacity:0;}}
</style>
</head>

<h1>🍕 피자 가게 사장님</h1>
<div id="hud">
  <span>💰 <span id="money">0</span>원</span>
  <span>😊 <span id="happy">0</span></span>
  <span>😤 <span id="angry">0</span></span>
  <span>Lv.<span id="level">1</span></span>
  <span id="buff-display"></span>
</div>
<div id="tab-row">
  <button class="tab on" id="tab-game" onclick="showTab('game')">🍕 주방</button>

</div>

<div id="game-view">
  <div id="main">
    <div id="left">
      <div class="panel">
        <div class="ptitle">👤 현재 손님</div>
        <div id="cur-cust"><div style="font-size:12px;color:#94a3b8;">손님 기다리는 중...</div></div>
      </div>
      <div class="panel">
        <div class="ptitle">🕐 대기</div>
        <div class="queue-row" id="queue"></div>
      </div>
      <div id="pizza-display">
        <canvas id="pc" width="184" height="184"></canvas>
        <div id="tl"></div>
      </div>
    </div>
    <div id="right">
      <div id="steps">
        <div class="step active" id="step1">
          <div class="step-head"><div class="step-num" id="sn1">1</div><div class="step-title">🍅 소스 선택</div></div>
          <div class="step-body" id="sauce-row">
            <button class="sbtn" onclick="setSauce('tomato')" data-s="tomato">🍅 토마토</button>
            <button class="sbtn" onclick="setSauce('cream')" data-s="cream">☁️ 크림</button>
            <button class="sbtn" onclick="setSauce('bbq')" data-s="bbq">🍖 BBQ</button>
            <button class="sbtn" onclick="setSauce('garlic')" data-s="garlic">🌿 갈릭</button>
          </div>
        </div>
        <div class="step locked" id="step2">
          <div class="step-head"><div class="step-num" id="sn2">2</div><div class="step-title">🧀 토핑 <span id="topping-count" style="font-size:10px;font-weight:400;color:#94a3b8;"></span></div></div>
          <div class="step-body" id="topping-grid"></div>
        </div>
        <div class="step locked" id="step3">
          <div class="step-head"><div class="step-num" id="sn3">3</div><div class="step-title">🔥 굽기</div></div>
          <div class="step-body">
            <button class="bbtn" onclick="setBake('light')" data-b="light">🌕 약하게</button>
            <button class="bbtn" onclick="setBake('normal')" data-b="normal">🔥 보통</button>
            <button class="bbtn" onclick="setBake('well')" data-b="well">🌑 바삭하게</button>
          </div>
        </div>
      </div>
      <div id="action-row">
        <button id="serve-btn" onclick="servePizza()">🍕 서빙!</button>
        <button id="rst-btn" onclick="resetPizza()">🗑 초기화</button>
      </div>
      <div id="msg"></div>
    </div>
  </div>
</div>
<div id="shop-view"></div>
<div class="notif-wrap" id="notif"></div>

function buyTheme(id){

function buyItem(id){

function updateStepUI(){
  const ts=T();
  const s1=document.getElementById('step1'),s2=document.getElementById('step2'),s3=document.getElementById('step3');
  if(curStep===0){s1.className='step active';s2.className='step locked';s3.className='step locked';}
  else if(curStep===1){s1.className='step done';s2.className='step active';s3.className='step locked';}
  else if(curStep===2){s1.className='step done';s2.className='step done';s3.className='step active';}
  else{s1.className='step done';s2.className='step done';s3.className='step done';}
  [s1,s2,s3].forEach((s,i)=>{
    s.style.cssText=ts.step;
    if(s.classList.contains('active'))s.style.cssText+=ts.stepActive;
    if(s.classList.contains('locked'))s.style.opacity='.35';
  });
  const nums=[document.getElementById('sn1'),document.getElementById('sn2'),document.getElementById('sn3')];
  [s1,s2,s3].forEach((s,i)=>{
    const n=nums[i];if(!n)return;
    if(s.classList.contains('done')){n.textContent='✓';n.style.cssText=ts.numDone;}
    else if(s.classList.contains('active')){n.textContent=i+1+'';n.style.cssText=ts.numActive;}
    else{n.textContent=i+1+'';n.style.cssText=ts.numDef;}
  });

function setSauce(s){

function addT(e,n){
  if(curStep!==1)return;
  if(Object.values(curToppings).reduce((a,b)=>a+b,0)>=10)return;
  curToppings[n]=(curToppings[n]||0)+1;
  const angle=Math.random()*Math.PI*2,r=Math.random()*60+10;
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${CX+r*Math.cos(angle)}px;top:${CY+r*Math.sin(angle)}px;font-size:16px;transform:translate(-50%,-50%) rotate(${rnd(-20,20)}deg);`;
  d.textContent=e;document.getElementById('tl').appendChild(d);
  updateToppingCounts();showNextBtn();

function removeT(n,ev){
  ev.stopPropagation();if(curStep!==1||!curToppings[n])return;

function redrawToppings(){

      d.style.cssText=`position:absolute;left:${CX+r*Math.cos(angle)}px;top:${CY+r*Math.sin(angle)}px;font-size:16px;transform:translate(-50%,-50%) rotate(${rnd(-20,20)}deg);`;

function setBake(b){

function drawPizza(){
  ctx.clearRect(0,0,184,184);
  ctx.beginPath();ctx.arc(CX,CY,CR,0,Math.PI*2);ctx.fillStyle=curBake?BCC[curBake]:'#e8c58a';ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=curBake?BC[curBake]:'#f5dfa0';ctx.fill();
  if(curSauce){ctx.beginPath();ctx.arc(CX,CY,R-5,0,Math.PI*2);ctx.fillStyle=SC[curSauce];ctx.globalAlpha=.8;ctx.fill();ctx.globalAlpha=1;}
}
function getTimeLimit(){return Math.max(25000,(buffs.timer?75000:60000)-(level-1)*5000);}
function getSpawnInterval(){return Math.max(5000,12000-(level-1)*1200);}
function getMaxSlot(){return buffs.slot?6:4;}
function scheduleSpawn(){clearInterval(spawnTimer);spawnTimer=setInterval(spawnCustomer,getSpawnInterval());}
function spawnCustomer(){
  if(customers.length>=getMaxSlot())return;
  const isVIP=buffs.vip&&Math.random()<0.2;
  const menu=MENUS[rnd(0,MENUS.length-1)];
  const id=nextId++,tl=getTimeLimit();
  customers.push({id,menu,timeLeft:tl,maxTime:tl,vip:isVIP});
  newIds.add(id);
  popup(`${isVIP?'👑 VIP ':''} ${menu.emoji} 새 손님! "${menu.name}"`,isVIP?'#7c3aed':'#c2410c');
  renderQueue();if(renderedCurId===null)renderCurrentCard();updateStepUI();
  setTimeout(()=>newIds.delete(id),2500);
  const iv=setInterval(()=>{
    const c=customers.find(x=>x.id===id);if(!c){clearInterval(iv);return;}
    c.timeLeft-=500;
    if(customers[0]&&customers[0].id===id)updateTimerOnly(id);
    if(c.timeLeft<=0){clearInterval(iv);loseCustomer(id);}
  },500);
  timers[id]=iv;
}
function updateTimerOnly(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const pct=Math.max(0,c.timeLeft/c.maxTime*100);
  const bc=pct>55?'#16a34a':pct>25?'#f59e0b':'#dc2626';
  const bar=document.getElementById('tb-'+id),lbl=document.getElementById('ts-'+id);
  if(bar){bar.style.width=pct+'%';bar.style.background=bc;}
  if(lbl){lbl.textContent=Math.ceil(c.timeLeft/1000)+'초';lbl.style.color=bc;}
}

function renderQueue(){

function loseCustomer(id){
  clearInterval(timers[id]);
  const c=customers.find(x=>x.id===id);
  customers=customers.filter(x=>x.id!==id);
  angry++;comboCount=0;updateHUD();
  renderedCurId=null;renderCurrentCard();renderQueue();updateStepUI();
  popup(`${c?c.menu.emoji:''} 손님이 화내며 가셨어요!`,'#991b1b');
  showMsg('😤 너무 오래 기다렸어요!','#dc2626','#fef2f2');

  updateBuffDisplay();

function servePizza(){
  if(!customers.length){showMsg('❌ 손님 없어요!','#dc2626','#fef2f2');return;}
  if(curStep!==3){showMsg('❌ 피자를 완성해요!','#dc2626','#fef2f2');return;}
  const c=customers[0],o=c.menu;
  let ok=curSauce===o.sauce&&curBake===o.bake;
  const oK=Object.keys(o.toppings);
  if(oK.length!==Object.keys(curToppings).length)ok=false;
  else oK.forEach(k=>{if((curToppings[k]||0)!==o.toppings[k])ok=false;});
  if(!ok&&buffs.hint){
    const bad=[];
    if(curSauce!==o.sauce)bad.push('소스');if(curBake!==o.bake)bad.push('굽기');
    oK.forEach(k=>{if((curToppings[k]||0)!==o.toppings[k])bad.push(k);});
    showMsg(`💡 틀린 항목: ${bad.join(', ')}!`,'#dc2626','#fef2f2');return;
  }
  clearInterval(timers[c.id]);customers=customers.filter(x=>x.id!==c.id);renderedCurId=null;
  if(ok){
    let earn=5000+level*500;if(c.vip)earn*=2;if(buffs.tip)earn+=1000;
    comboCount++;if(buffs.combo&&comboCount%3===0){earn+=3000;popup('🔥 콤보! +3,000원','#b45309');}
    money+=earn;happy++;
    popup(`${c.menu.emoji} 완벽! +${earn.toLocaleString()}원`,'#166534');
    showMsg(`✅ +${earn.toLocaleString()}원 🤤`,'#166534','#dcfce7');
  }else{
    money+=500;angry++;comboCount=0;
    popup('⚠️ 주문이 달랐어요','#92400e');showMsg('⚠️ 달랐어요 +500원','#92400e','#fef3c7');
  }
  updateHUD();renderCurrentCard();renderQueue();
  const tot=happy+angry;
  if(tot>0&&tot%5===0){level=Math.min(level+1,8);updateHUD();scheduleSpawn();popup('🎉 레벨업! Lv.'+level,'#5b21b6');}
  resetPizza();updateStepUI();
}
function showMsg(t,color,bg){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.color=color||'';el.style.background=bg||'transparent';
  setTimeout(()=>{el.textContent='';el.style.background='transparent';},2500);
}
buildGrid();drawPizza();applyTheme('classic');updateStepUI();updateHUD();
spawnCustomer();scheduleSpawn();
</script>
</body>
