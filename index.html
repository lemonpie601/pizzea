<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피자 가게 사장님</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fdf6ec;--surface:#fff;--surface2:#fff7ed;--border:#fed7aa;
  --text:#1e293b;--text2:#7c2d12;--text3:#94a3b8;--accent:#c2410c;--accent2:#f97316;
  --step-active:#f97316;--step-done:#22c55e;
  --num-def-bg:#f1f5f9;--num-def-c:#94a3b8;
  --btn-bg:#fff;--btn-c:#7c2d12;--pill-bg:#fff;--pill-c:#7c2d12;
  --tbar-bg:#f1f5f9;--hud-bg:#fff;--hud-border:#fed7aa;
}
body{font-family:'Noto Sans KR','Noto Color Emoji',sans-serif;background:var(--bg);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:.8rem 0 2.5rem;transition:background .35s;}

#hud{display:flex;gap:10px;font-size:13px;font-weight:500;padding:7px 18px;
  border-radius:28px;background:var(--hud-bg);border:1.5px solid var(--hud-border);
  box-shadow:0 2px 12px rgba(0,0,0,.07);flex-wrap:wrap;justify-content:center;
  margin-bottom:8px;color:var(--text);transition:background .35s,border-color .35s,color .35s;}
.hud-label{font-size:10px;opacity:.55;margin-right:1px;}

#mode-badge{font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;
  background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5;margin-bottom:6px;display:none;}
#mode-badge.show{display:inline-block;}

#tab-row{display:flex;gap:6px;margin-bottom:10px;}
.tab{font-size:13px;padding:7px 20px;border-radius:24px;cursor:pointer;
  border:1.5px solid var(--border);background:var(--btn-bg);color:var(--accent);
  font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s;}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}

#game-view{width:100%;display:flex;justify-content:center;}
#shop-view{width:100%;max-width:700px;padding:0 12px;display:none;}
#main{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
#left{width:218px;display:flex;flex-direction:column;gap:8px;}

.panel{border-radius:16px;border:1.5px solid var(--border);padding:12px;
  background:var(--surface);box-shadow:0 2px 8px rgba(0,0,0,.04);
  transition:background .35s,border-color .35s;}
.ptitle{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.08em;transition:color .35s;}

.ccard{border-radius:12px;border:1.5px solid var(--border);padding:10px;
  background:var(--surface);animation:slideIn .3s ease;
  transition:background .35s,border-color .35s;}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}
.cname{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;
  margin-bottom:6px;color:var(--text);transition:color .35s;}
.nbadge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:12px;animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(0);}65%{transform:scale(1.2);}100%{transform:scale(1);}}
.corder{font-size:11px;border-radius:10px;padding:8px 10px;line-height:1.9;
  background:var(--surface2);transition:background .35s;}
.crow{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap;}
.clabel{font-weight:700;color:var(--accent);font-size:10px;min-width:26px;transition:color .35s;}

/* 토핑 아이콘 pills */
.tpill{display:inline-flex;align-items:center;gap:2px;background:var(--pill-bg);
  border:1px solid var(--border);border-radius:8px;padding:3px 7px;
  font-size:14px;margin:2px;transition:background .35s,border-color .35s;}
.tpill-cnt{font-size:9px;font-weight:700;color:var(--accent);margin-left:2px;transition:color .35s;}
.hard-blur{filter:blur(4px);opacity:.35;user-select:none;pointer-events:none;}

.tbar-wrap{margin-top:8px;}
.tbar-lbl{font-size:10px;color:var(--text3);display:flex;justify-content:space-between;
  margin-bottom:3px;transition:color .35s;}
.tbar-bg{height:6px;border-radius:3px;background:var(--tbar-bg);transition:background .35s;}
.tbar{height:6px;border-radius:3px;transition:width .5s,background .5s;}

.queue-row{display:flex;gap:5px;flex-wrap:wrap;min-height:28px;}
.qdot{font-size:22px;}
.qdot.newq{animation:bounceIn .3s ease;}
@keyframes bounceIn{0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}}

#pizza-display{position:relative;width:188px;height:188px;margin:0 auto;}
#pc{border-radius:50%;display:block;box-shadow:0 4px 20px rgba(194,65,12,.2);}
#tl{position:absolute;top:0;left:0;width:188px;height:188px;pointer-events:none;}

#right{display:flex;flex-direction:column;align-items:center;gap:8px;}
#steps{display:flex;flex-direction:column;gap:7px;width:100%;max-width:320px;}
.step{border-radius:14px;border:1.5px solid var(--border);padding:10px 12px;
  background:var(--surface);transition:opacity .2s,border-color .2s,background .35s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);}
.step.locked{opacity:.28;pointer-events:none;}
.step.active{border-color:var(--step-active);box-shadow:0 0 0 3px rgba(249,115,22,.12);}
.step.done{opacity:.55;}
.step-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--num-def-bg);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--num-def-c);flex-shrink:0;transition:all .25s;}
.step.active .step-num{background:var(--step-active);color:#fff;}
.step.done .step-num{background:var(--step-done);color:#fff;}
.step-title{font-size:12px;font-weight:700;color:var(--text);transition:color .35s;}
.step-body{display:flex;gap:5px;flex-wrap:wrap;}

.sbtn,.bbtn{font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;
  border:1.5px solid var(--border);background:var(--btn-bg);color:var(--btn-c);
  font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:background .15s,color .35s,border-color .35s;}
.sbtn:hover,.bbtn:hover{opacity:.75;}
.sbtn.active{background:#fef3c7!important;border-color:#f59e0b!important;color:#92400e!important;font-weight:700;}
.bbtn.active{background:#fff7ed!important;border-color:#f97316!important;color:#9a3412!important;font-weight:700;}

.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 3px;
  border-radius:10px;cursor:pointer;position:relative;min-width:52px;
  border:1.5px solid var(--border);background:var(--btn-bg);
  transition:background .15s,border-color .35s;}
.tbtn:hover{transform:scale(1.06);}
.tbtn:active{transform:scale(.92);}
.temo{font-size:18px;line-height:1;}
.tname{font-size:9px;color:var(--text3);font-weight:500;transition:color .35s;}
.tcnt{position:absolute;top:2px;right:3px;font-size:10px;font-weight:700;color:#16a34a;}
.tremove{position:absolute;top:2px;left:2px;font-size:9px;color:#dc2626;font-weight:700;cursor:pointer;}

#action-row{display:flex;gap:8px;width:100%;max-width:320px;}
#serve-btn{flex:1;font-size:13px;font-weight:700;padding:11px;border:none;border-radius:24px;
  background:#d1d5db;color:#fff;cursor:not-allowed;transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;}
#serve-btn.ready{background:#16a34a;cursor:pointer;box-shadow:0 3px 12px rgba(22,163,74,.3);}
#serve-btn.ready:hover{background:#15803d;transform:scale(1.02);}
#rst-btn{font-size:12px;padding:11px 14px;border-radius:24px;cursor:pointer;
  border:1.5px solid var(--border);background:var(--btn-bg);color:var(--btn-c);
  font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:background .15s,color .35s,border-color .35s;}
#msg{font-size:12px;font-weight:700;min-height:22px;text-align:center;padding:4px 14px;border-radius:20px;color:var(--text);}

/* shop */
.shop-sec-title{font-size:12px;font-weight:700;color:var(--accent);margin:16px 0 9px;
  letter-spacing:.04em;transition:color .35s;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}
.scard{border-radius:14px;border:1.5px solid var(--border);padding:12px;
  display:flex;flex-direction:column;gap:5px;background:var(--surface);
  box-shadow:0 1px 5px rgba(0,0,0,.04);transition:background .35s,border-color .35s;}
.scard.owned{border-color:#16a34a;}
.scard.cant{opacity:.4;}
.sicon{font-size:26px;line-height:1;}
.sname{font-size:12px;font-weight:700;color:var(--text);transition:color .35s;}
.sdesc{font-size:11px;line-height:1.5;color:var(--text3);transition:color .35s;}
.sbuy{font-size:11px;font-weight:700;padding:6px 8px;border:none;border-radius:20px;
  cursor:pointer;margin-top:auto;font-family:'Noto Sans KR',sans-serif;}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:6px;}
.tcard{border-radius:14px;border:2px solid transparent;padding:11px 8px;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;gap:4px;align-items:center;
  box-shadow:0 1px 6px rgba(0,0,0,.1);}
.tcard:hover{transform:scale(1.04);}
.tcard-name{font-size:12px;font-weight:700;}
.tcard-tag{font-size:10px;opacity:.5;}

/* hard mode card */
.hard-card{border-radius:16px;border:2px solid #fca5a5;padding:14px 16px;
  background:linear-gradient(135deg,#fff1f2 0%,#fff 100%);margin-bottom:6px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(239,68,68,.1);}
.hard-card-title{font-size:14px;font-weight:700;color:#991b1b;margin-bottom:3px;}
.hard-card-desc{font-size:11px;color:#b91c1c;line-height:1.55;}
.hard-toggle{font-size:12px;font-weight:700;padding:8px 18px;border:none;border-radius:20px;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.hard-toggle.off{background:#fee2e2;color:#991b1b;}
.hard-toggle.on{background:#991b1b;color:#fff;box-shadow:0 2px 8px rgba(153,27,27,.3);}

.notif-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;}
.npop{font-size:13px;font-weight:700;padding:7px 18px;border-radius:20px;color:#fff;
  white-space:nowrap;animation:npopAnim 2.2s ease forwards;box-shadow:0 4px 14px rgba(0,0,0,.2);}
@keyframes npopAnim{0%{opacity:0;transform:translateY(-10px) scale(.9);}15%{opacity:1;transform:translateY(0) scale(1);}78%{opacity:1;}100%{opacity:0;}}

@keyframes hardFlash{0%,100%{opacity:1;}50%{opacity:.6;}}
.hard-shake{animation:hardFlash .35s ease;}
</style>
</head>
<body>
<div id="hud">
  <span><span class="hud-label">💰</span><span id="money">0</span>원</span>
  <span><span class="hud-label">😊</span><span id="happy">0</span></span>
  <span><span class="hud-label">😤</span><span id="angry">0</span></span>

</div>

<div id="tab-row">
  <button class="tab on" id="tab-game" onclick="showTab('game')">🍕 주방</button>
  <button class="tab" id="tab-shop" onclick="showTab('shop')">🛒 상점</button>
</div>

<div id="game-view">
  <div id="main">
    <div id="left">
      <div class="panel">
        <div class="ptitle">👤 현재 손님</div>

      </div>

        <div class="ptitle">🕐 대기</div>
        <div class="queue-row" id="queue"></div>
      </div>
      <div id="pizza-display">
        <canvas id="pc" width="188" height="188"></canvas>
        <div id="tl"></div>
      </div>
    </div>
    <div id="right">
      <div id="steps">
        <div class="step active" id="step1">
          <div class="step-head"><div class="step-num" id="sn1">1</div><div class="step-title">🍅 소스 선택</div></div>

          </div>
        </div>
        <div class="step locked" id="step2">
          <div class="step-head"><div class="step-num" id="sn2">2</div>
            <div class="step-title">🧀 토핑 <span id="topping-count" style="font-size:10px;font-weight:400;color:var(--text3);"></span></div>
          </div>
          <div class="step-body" id="topping-grid"></div>
        </div>
        <div class="step locked" id="step3">
          <div class="step-head"><div class="step-num" id="sn3">3</div><div class="step-title">🔥 굽기</div></div>
          <div class="step-body">
            <button class="bbtn" onclick="setBake('light')" data-b="light">🌕 약하게</button>
            <button class="bbtn" onclick="setBake('normal')" data-b="normal">🔥 보통</button>
            <button class="bbtn" onclick="setBake('well')" data-b="well">🌑 바삭</button>
          </div>
        </div>
      </div>
      <div id="action-row">
        <button id="serve-btn" onclick="servePizza()">🍕 서빙!</button>
        <button id="rst-btn" onclick="resetPizza()">🗑 초기화</button>
      </div>
      <div id="msg"></div>
    </div>
  </div>
</div>
<div id="shop-view"></div>
<div class="notif-wrap" id="notif"></div>

const BC={light:'#f5dfa0',normal:'#d4a043',well:'#8b5e1a'};
const BCC={light:'#e8c58a',normal:'#c47a2b',well:'#7a4010'};
const SN={tomato:'🍅 토마토',cream:'☁️ 크림',bbq:'🍖 BBQ',garlic:'🌿 갈릭'};
const BN={light:'🌕 약하게',normal:'🔥 보통',well:'🌑 바삭'};
const TOPPINGS=[
  {e:'🧀',n:'치즈'},{e:'🍖',n:'불고기'},{e:'🥓',n:'베이컨'},
  {e:'🍤',n:'새우'},{e:'🌽',n:'옥수수'},{e:'🍄',n:'버섯'},
  {e:'🥬',n:'파프리카'},{e:'🍵',n:'올리브'},{e:'🌶️',n:'고추'},{e:'🌰',n:'양파'}
];
const MENUS=[
  {name:'마르게리타',sauce:'tomato',bake:'normal',toppings:{치즈:2},emoji:'👩'},
  {name:'불고기 피자',sauce:'tomato',bake:'normal',toppings:{치즈:1,불고기:2},emoji:'👨'},
  {name:'베이컨 크림',sauce:'cream',bake:'light',toppings:{치즈:1,베이컨:2,옥수수:1},emoji:'👧'},
  {name:'새우 갈릭',sauce:'garlic',bake:'normal',toppings:{치즈:1,새우:2},emoji:'👴'},
  {name:'버섯 BBQ',sauce:'bbq',bake:'well',toppings:{치즈:1,불고기:1,버섯:2},emoji:'👵'},
  {name:'야채 피자',sauce:'tomato',bake:'light',toppings:{치즈:1,파프리카:1,옥수수:1,양파:1},emoji:'🧑'},
  {name:'고추 불고기',sauce:'bbq',bake:'well',toppings:{치즈:1,불고기:2,고추:1},emoji:'👦'},
  {name:'올리브 크림',sauce:'cream',bake:'normal',toppings:{치즈:1,올리브:2,새우:1},emoji:'🧒'},
];

let money=0,happy=0,angry=0,level=1;
let curSauce=null,curBake=null,curToppings={},curStep=0;
let customers=[],timers={},nextId=0,newIds=new Set(),renderedCurId=null,spawnTimer=null;
let buffs={tip:false,vip:false,combo:false,timer:false,slot:false,undo:false,hint:false,freeze:0,auto:false};
let comboCount=0,currentTheme='classic',ownedThemes=new Set(['classic']),currentTab='game';
let hardMode=false;

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function applyTheme(id){
  currentTheme=id;
  const root=document.documentElement;
  Object.entries(THEMES[id].v).forEach(([k,v])=>root.style.setProperty(k,v));
  document.getElementById('tab-game').className='tab'+(currentTab==='game'?' on':'');
  document.getElementById('tab-shop').className='tab'+(currentTab==='shop'?' on':'');
}

function popup(txt,bg){
  const n=document.getElementById('notif'),d=document.createElement('div');
  d.className='npop';d.style.background=bg||'#1e293b';d.textContent=txt;
  n.appendChild(d);setTimeout(()=>d.remove(),2300);
}

function showTab(t){
  currentTab=t;
  document.getElementById('game-view').style.display=t==='game'?'flex':'none';
  document.getElementById('shop-view').style.display=t==='shop'?'block':'none';
  document.getElementById('tab-game').className='tab'+(t==='game'?' on':'');
  document.getElementById('tab-shop').className='tab'+(t==='shop'?' on':'');
  if(t==='shop')renderShop();
}

function toggleHard(){
  hardMode=!hardMode;
  document.getElementById('mode-badge').className=hardMode?'show':'';
  renderedCurId=null;renderCurrentCard();
  renderShop();
  popup(hardMode?'💀 하드모드 ON! 수익 2배!':'😅 하드모드 OFF','#991b1b');
}

function renderShop(){
  const th=THEMES[currentTheme];
  let html='';
  // 하드모드
  html+=`<div class="hard-card">
    <div style="font-size:34px;line-height:1;">💀</div>
    <div style="flex:1;">
      <div class="hard-card-title">하드모드</div>
      <div class="hard-card-desc">토핑/소스/굽기가 흐릿하게 보여요.<br>타이머 30% 빠름. 수익은 2배!</div>
    </div>
    <button class="hard-toggle ${hardMode?'on':'off'}" onclick="toggleHard()">${hardMode?'ON ✓':'OFF'}</button>
  </div>`;

  const active=SHOP_ITEMS.filter(x=>x.owned);
  if(active.length){
    html+=`<div class="shop-sec-title">✅ 보유 업그레이드</div>`;
    html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">`;
    active.forEach(b=>{html+=`<span style="font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text);">${b.icon} ${b.name}</span>`;});
    html+=`</div>`;
    if(buffs.freeze>0)html+=`<div style="font-size:11px;margin-bottom:12px;color:var(--accent);">❄️ 남은 횟수: ${buffs.freeze}회 <button onclick="useFreeze()" style="font-size:11px;padding:2px 10px;border-radius:20px;border:none;background:#0369a1;color:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">사용</button></div>`;
  }

  // 테마
  html+=`<div class="shop-sec-title">🎨 테마 변경</div><div class="theme-grid">`;
  Object.entries(THEMES).forEach(([tid,t])=>{
    const owned=ownedThemes.has(tid),isSel=currentTheme===tid;
    const bg=t.v['--bg'],tc=t.v['--text'],ac=t.v['--accent'];
    html+=`<div class="tcard" style="background:${bg};border-color:${isSel?ac:owned?'#16a34a':'transparent'};" onclick="${owned?`doApplyTheme('${tid}')`:''}" >
      <div style="font-size:22px;">${t.icon}</div>
      <div class="tcard-name" style="color:${tc}">${t.name}</div>
      <div class="tcard-tag" style="color:${tc}">${t.tag}</div>
      ${isSel?`<div style="font-size:10px;font-weight:700;color:${ac}">✓ 적용 중</div>`
       :owned?`<div style="font-size:10px;font-weight:700;color:#16a34a">보유 중</div>`
       :`<button onclick="buyTheme('${tid}')" style="font-size:11px;padding:4px 8px;border:none;border-radius:20px;background:${money>=t.price?ac:'#9ca3af'};color:#fff;cursor:${money>=t.price?'pointer':'not-allowed'};font-family:'Noto Sans KR',sans-serif;font-weight:700;">💰 ${t.price.toLocaleString()}원</button>`}
    </div>`;
  });
  html+=`</div>`;

  const sections={};
  SHOP_ITEMS.forEach(item=>{if(!sections[item.section])sections[item.section]=[];sections[item.section].push(item);});
  Object.entries(sections).forEach(([sec,items])=>{
    html+=`<div class="shop-sec-title">${sec}</div><div class="shop-grid">`;
    items.forEach(item=>{
      const canBuy=!item.owned&&money>=item.price;
      html+=`<div class="scard ${item.owned?'owned':!canBuy?'cant':''}">
        <div class="sicon">${item.icon}</div>
        <div class="sname">${item.name}</div>
        <div class="sdesc">${item.desc}</div>
        <button class="sbuy" style="${item.owned?'background:#dcfce7;color:#15803d;cursor:default;':canBuy?'background:#1d4ed8;color:#fff;cursor:pointer;':'background:#e5e7eb;color:#9ca3af;cursor:not-allowed;'}" onclick="buyItem('${item.id}')">
          ${item.owned?'✓ 보유 중':canBuy?`💰 ${item.price.toLocaleString()}원`:`💸 ${item.price.toLocaleString()}원`}
        </button>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('shop-view').innerHTML=html;
}

function doApplyTheme(id){
  applyTheme(id);renderShop();
  popup(`${THEMES[id].icon} "${THEMES[id].name}" 테마 적용!`,'#5b21b6');
}
function buyTheme(id){
  const t=THEMES[id];if(ownedThemes.has(id)||money<t.price)return;
  money-=t.price;ownedThemes.add(id);updateHUD();doApplyTheme(id);
  popup(`${t.icon} "${t.name}" 테마 구매!`,'#5b21b6');
}
function buyItem(id){
  const item=SHOP_ITEMS.find(x=>x.id===id);if(!item||item.owned||money<item.price)return;
  money-=item.price;item.owned=true;
  if(id==='freeze')buffs.freeze=3;else buffs[id]=true;
  updateHUD();renderShop();popup(`${item.icon} "${item.name}" 구매 완료!`,'#7c3aed');
}
function useFreeze(){
  if(!buffs.freeze||!customers.length)return;
  buffs.freeze--;customers[0].timeLeft=Math.min(customers[0].timeLeft+10000,customers[0].maxTime);
  popup('❄️ +10초!','#0369a1');renderShop();updateHUD();
}

function updateBuffDisplay(){
  const p=[];
  if(buffs.tip)p.push('💸');if(buffs.vip)p.push('👑');
  if(buffs.combo)p.push('🔥'+comboCount);if(buffs.freeze>0)p.push('❄️×'+buffs.freeze);
  if(hardMode)p.push('💀');
  document.getElementById('buff-display').innerHTML=p.map(x=>`<span style="font-size:12px;">${x}</span>`).join(' ');
}

const canvas=document.getElementById('pc'),ctx=canvas.getContext('2d');
const CX=94,CY=94,R=82,CR=92;

function buildGrid(){
  const g=document.getElementById('topping-grid');g.innerHTML='';
  TOPPINGS.forEach(t=>{
    const b=document.createElement('button');b.className='tbtn';
    b.innerHTML=`<span class="temo">${t.e}</span><span class="tname">${t.n}</span><span class="tcnt" id="tc-${t.n}"></span><span class="tremove" id="tr-${t.n}" onclick="removeT('${t.n}',event)" style="display:none;">✕</span>`;
    b.onclick=()=>addT(t.e,t.n);g.appendChild(b);
  });
}

function updateStepUI(){
  const s1=document.getElementById('step1'),s2=document.getElementById('step2'),s3=document.getElementById('step3');
  if(curStep===0){s1.className='step active';s2.className='step locked';s3.className='step locked';}
  else if(curStep===1){s1.className='step done';s2.className='step active';s3.className='step locked';}
  else if(curStep===2){s1.className='step done';s2.className='step done';s3.className='step active';}
  else{s1.className='step done';s2.className='step done';s3.className='step done';}
  [['sn1','step1'],['sn2','step2'],['sn3','step3']].forEach(([nid,sid],i)=>{
    const n=document.getElementById(nid),s=document.getElementById(sid);
    n.textContent=s.classList.contains('done')?'✓':(i+1)+'';
  });
  document.getElementById('serve-btn').className=curStep===3&&customers.length?'ready':'';
  if(buffs.undo&&curStep>=1){s1.style.pointerEvents='auto';s1.style.opacity='.85';}
}

function updateToppingCounts(){
  TOPPINGS.forEach(t=>{
    const el=document.getElementById('tc-'+t.n),rm=document.getElementById('tr-'+t.n);
    const cnt=curToppings[t.n]||0;
    if(el)el.textContent=cnt||'';if(rm)rm.style.display=cnt>0?'block':'none';
  });
  const total=Object.values(curToppings).reduce((a,b)=>a+b,0);
  document.getElementById('topping-count').textContent=total?`(${total}개)`:'';
}

function setSauce(s){
  if(curStep!==0&&!buffs.undo)return;
  curSauce=s;
  document.querySelectorAll('.sbtn[data-s]').forEach(b=>b.classList.toggle('active',b.dataset.s===s));
  drawPizza();if(curStep===0)curStep=1;updateStepUI();
}
function addT(e,n){
  if(curStep!==1)return;
  if(Object.values(curToppings).reduce((a,b)=>a+b,0)>=10)return;
  curToppings[n]=(curToppings[n]||0)+1;
  const angle=Math.random()*Math.PI*2,r=Math.random()*60+10;
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${CX+r*Math.cos(angle)}px;top:${CY+r*Math.sin(angle)}px;font-size:16px;transform:translate(-50%,-50%) rotate(${rnd(-20,20)}deg);`;
  d.textContent=e;document.getElementById('tl').appendChild(d);
  updateToppingCounts();showNextBtn();
}
function removeT(n,ev){
  ev.stopPropagation();if(curStep!==1||!curToppings[n])return;
  curToppings[n]--;if(!curToppings[n])delete curToppings[n];
  redrawToppings();updateToppingCounts();showNextBtn();
}
function redrawToppings(){
  const tl=document.getElementById('tl');tl.innerHTML='';
  Object.entries(curToppings).forEach(([n,cnt])=>{
    const t=TOPPINGS.find(x=>x.n===n);if(!t)return;
    for(let i=0;i<cnt;i++){
      const angle=Math.random()*Math.PI*2,r=Math.random()*60+10;
      const d=document.createElement('div');
      d.style.cssText=`position:absolute;left:${CX+r*Math.cos(angle)}px;top:${CY+r*Math.sin(angle)}px;font-size:16px;transform:translate(-50%,-50%) rotate(${rnd(-20,20)}deg);`;
      d.textContent=t.e;tl.appendChild(d);
    }
  });
}
function showNextBtn(){
  let nb=document.getElementById('tnb');
  const total=Object.values(curToppings).reduce((a,b)=>a+b,0);
  if(total>0&&!nb){
    nb=document.createElement('button');nb.id='tnb';
    nb.style.cssText="background:#1d4ed8;color:#fff;border:1.5px solid #1d4ed8;font-weight:700;width:100%;margin-top:5px;font-size:11px;padding:7px;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;";
    nb.textContent='굽기 선택 →';nb.onclick=()=>{if(curStep===1){curStep=2;updateStepUI();}};
    document.getElementById('topping-grid').after(nb);
  }else if(total===0&&nb)nb.remove();
}
function setBake(b){
  if(curStep!==2)return;
  curBake=b;
  document.querySelectorAll('.bbtn[data-b]').forEach(btn=>btn.classList.toggle('active',btn.dataset.b===b));
  drawPizza();curStep=3;updateStepUI();
}
function resetPizza(){
  curSauce=null;curBake=null;curToppings={};curStep=0;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tl').innerHTML='';
  const nb=document.getElementById('tnb');if(nb)nb.remove();
  updateToppingCounts();drawPizza();updateStepUI();
}
function drawPizza(){
  ctx.clearRect(0,0,188,188);
  ctx.beginPath();ctx.arc(CX,CY,CR,0,Math.PI*2);ctx.fillStyle=curBake?BCC[curBake]:'#e8c58a';ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=curBake?BC[curBake]:'#f5dfa0';ctx.fill();
  if(curSauce){ctx.beginPath();ctx.arc(CX,CY,R-5,0,Math.PI*2);ctx.fillStyle=SC[curSauce];ctx.globalAlpha=.8;ctx.fill();ctx.globalAlpha=1;}
}

function getTimeLimit(){
  const base=buffs.timer?75000:60000;
  const hard=hardMode?base*.3:0;
  return Math.max(15000,base-(level-1)*5000-hard);
}
function getSpawnInterval(){return Math.max(5000,12000-(level-1)*1200);}
function getMaxSlot(){return buffs.slot?6:4;}
function scheduleSpawn(){clearInterval(spawnTimer);spawnTimer=setInterval(spawnCustomer,getSpawnInterval());}

function spawnCustomer(){
  if(customers.length>=getMaxSlot())return;
  const isVIP=buffs.vip&&Math.random()<0.2;
  const menu=MENUS[rnd(0,MENUS.length-1)];
  const id=nextId++,tl=getTimeLimit();
  customers.push({id,menu,timeLeft:tl,maxTime:tl,vip:isVIP});
  newIds.add(id);
  popup(`${isVIP?'👑 VIP ':''} ${menu.emoji} 새 손님! "${menu.name}"`,isVIP?'#7c3aed':'#c2410c');
  renderQueue();if(renderedCurId===null)renderCurrentCard();updateStepUI();
  setTimeout(()=>newIds.delete(id),2500);
  const iv=setInterval(()=>{
    const c=customers.find(x=>x.id===id);if(!c){clearInterval(iv);return;}
    c.timeLeft-=500;
    if(customers[0]&&customers[0].id===id)updateTimerOnly(id);
    if(c.timeLeft<=0){clearInterval(iv);loseCustomer(id);}
  },500);
  timers[id]=iv;
}
function updateTimerOnly(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const pct=Math.max(0,c.timeLeft/c.maxTime*100);
  const bc=pct>55?'#16a34a':pct>25?'#f59e0b':'#dc2626';
  const bar=document.getElementById('tb-'+id),lbl=document.getElementById('ts-'+id);
  if(bar){bar.style.width=pct+'%';bar.style.background=bc;}
  if(lbl){lbl.textContent=Math.ceil(c.timeLeft/1000)+'초';lbl.style.color=bc;}
}

function makeToppingPills(toppings){
  return Object.entries(toppings).map(([n,cnt])=>{
    const t=TOPPINGS.find(x=>x.n===n);
    const icon=t?t.e:'?';
    const blurClass=hardMode?' class="hard-blur"':'';
    const icons=Array(cnt).fill(`<span${blurClass}>${icon}</span>`).join('');
    return `<span class="tpill">${icons}<span class="tpill-cnt${hardMode?' hard-blur':''}">×${cnt}</span></span>`;
  }).join('');
}

function renderCurrentCard(){
  const cc=document.getElementById('cur-cust');
  if(!customers.length){
    cc.innerHTML=`<div style="font-size:12px;color:var(--text3);">손님 기다리는 중...</div>`;
    renderedCurId=null;return;
  }
  const f=customers[0];if(renderedCurId===f.id)return;
  renderedCurId=f.id;
  const pct=Math.max(0,f.timeLeft/f.maxTime*100);
  const bc=pct>55?'#16a34a':pct>25?'#f59e0b':'#dc2626';
  const isNew=newIds.has(f.id);
  const tpills=makeToppingPills(f.menu.toppings);
  const blurStyle=hardMode?'filter:blur(5px);opacity:.35;user-select:none;':'';
  const sShow=buffs.auto&&!hardMode?`<b style="color:#1d4ed8;">${SN[f.menu.sauce]}</b>`:`<span style="${blurStyle}">${SN[f.menu.sauce]}</span>`;
  const bShow=buffs.auto&&!hardMode?`<b style="color:#b45309;">${BN[f.menu.bake]}</b>`:`<span style="${blurStyle}">${BN[f.menu.bake]}</span>`;
  cc.innerHTML=`<div class="ccard">
    <div class="cname">${f.menu.emoji} ${f.menu.name}
      ${isNew?'<span class="nbadge" style="background:#dcfce7;color:#15803d;">NEW</span>':''}
      ${f.vip?'<span class="nbadge" style="background:#fef3c7;color:#92400e;">👑VIP</span>':''}
      ${hardMode?'<span class="nbadge" style="background:#fee2e2;color:#991b1b;">💀</span>':''}
    </div>
    <div class="corder">
      <div class="crow"><span class="clabel">소스</span>${sShow}</div>
      <div class="crow"><span class="clabel">굽기</span>${bShow}</div>
      <div class="crow"><span class="clabel">토핑</span>${tpills}</div>
    </div>
    <div class="tbar-wrap">
      <div class="tbar-lbl"><span>남은 시간</span><span id="ts-${f.id}" style="color:${bc};font-weight:700;">${Math.ceil(f.timeLeft/1000)}초</span></div>
      <div class="tbar-bg"><div class="tbar" id="tb-${f.id}" style="width:${pct}%;background:${bc};"></div></div>
    </div>
  </div>`;
}

function renderQueue(){
  document.getElementById('queue').innerHTML=customers.slice(1).map(c=>
    `<span class="qdot${newIds.has(c.id)?' newq':''}" title="${c.menu.name}">${c.vip?'👑':c.menu.emoji}</span>`
  ).join('');
}
function loseCustomer(id){
  clearInterval(timers[id]);
  const c=customers.find(x=>x.id===id);
  customers=customers.filter(x=>x.id!==id);
  angry++;comboCount=0;updateHUD();
  renderedCurId=null;renderCurrentCard();renderQueue();updateStepUI();
  popup(`${c?c.menu.emoji:''} 손님이 화내며 가셨어요!`,'#991b1b');
  showMsg('😤 너무 오래 기다렸어요!','#dc2626','#fef2f2');
}
function updateHUD(){
  document.getElementById('money').textContent=money.toLocaleString();
  document.getElementById('happy').textContent=happy;
  document.getElementById('angry').textContent=angry;
  document.getElementById('level').textContent=level;
  updateBuffDisplay();
}
function servePizza(){
  if(!customers.length){showMsg('❌ 손님 없어요!','#dc2626','#fef2f2');return;}
  if(curStep!==3){showMsg('❌ 피자를 완성해요!','#dc2626','#fef2f2');return;}
  const c=customers[0],o=c.menu;
  let ok=curSauce===o.sauce&&curBake===o.bake;
  const oK=Object.keys(o.toppings);
  if(oK.length!==Object.keys(curToppings).length)ok=false;
  else oK.forEach(k=>{if((curToppings[k]||0)!==o.toppings[k])ok=false;});
  if(!ok&&buffs.hint){
    const bad=[];
    if(curSauce!==o.sauce)bad.push('소스');if(curBake!==o.bake)bad.push('굽기');
    oK.forEach(k=>{if((curToppings[k]||0)!==o.toppings[k])bad.push(k);});
    showMsg(`💡 틀린 항목: ${bad.join(', ')}!`,'#dc2626','#fef2f2');return;
  }
  clearInterval(timers[c.id]);customers=customers.filter(x=>x.id!==c.id);renderedCurId=null;
  if(ok){
    let earn=5000+level*500;
    if(c.vip)earn*=2;if(buffs.tip)earn+=1000;if(hardMode)earn*=2;
    comboCount++;if(buffs.combo&&comboCount%3===0){earn+=3000;popup('🔥 콤보! +3,000원','#b45309');}
    money+=earn;happy++;
    popup(`${c.menu.emoji} 완벽! +${earn.toLocaleString()}원`,'#166534');
    showMsg(`✅ +${earn.toLocaleString()}원 🤤`,'#166534','#dcfce7');
  }else{
    money+=500;angry++;comboCount=0;
    if(hardMode){document.body.classList.add('hard-shake');setTimeout(()=>document.body.classList.remove('hard-shake'),400);}
    popup('⚠️ 주문이 달랐어요','#92400e');showMsg('⚠️ 달랐어요 +500원','#92400e','#fef3c7');
  }
  updateHUD();renderCurrentCard();renderQueue();
  const tot=happy+angry;
  if(tot>0&&tot%5===0){level=Math.min(level+1,8);updateHUD();scheduleSpawn();popup('🎉 레벨업! Lv.'+level,'#5b21b6');}
  resetPizza();updateStepUI();
}
function showMsg(t,color,bg){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.color=color||'';el.style.background=bg||'transparent';
  setTimeout(()=>{el.textContent='';el.style.background='transparent';},2500);
}
buildGrid();drawPizza();applyTheme('classic');updateStepUI();updateHUD();
spawnCustomer();scheduleSpawn();
</script>
</body>
</html>
