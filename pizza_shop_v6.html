
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#app{font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;gap:10px;padding:.8rem 0;}
#hud{display:flex;gap:14px;font-size:13px;font-weight:500;color:var(--color-text-primary);background:var(--color-background-secondary);padding:7px 16px;border-radius:8px;border:.5px solid var(--color-border-tertiary);}
#main{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
#left{width:210px;display:flex;flex-direction:column;gap:8px;}
.panel{background:var(--color-background-secondary);border-radius:10px;border:.5px solid var(--color-border-tertiary);padding:10px;}
.ptitle{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.ccard{background:var(--color-background-primary);border-radius:8px;border:.5px solid var(--color-border-tertiary);padding:9px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}
.cname{font-size:13px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.nbadge{font-size:9px;font-weight:500;background:#dcfce7;color:#15803d;padding:1px 5px;border-radius:4px;animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(0);}65%{transform:scale(1.25);}100%{transform:scale(1);}}
.corder{font-size:11.5px;background:var(--color-background-secondary);border-radius:6px;padding:6px 8px;line-height:2;}
.crow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.clabel{font-weight:500;color:var(--color-text-primary);min-width:28px;font-size:11px;}
.tpill{display:inline-flex;align-items:center;gap:2px;background:var(--color-background-tertiary);border:.5px solid var(--color-border-tertiary);border-radius:4px;padding:0 5px;font-size:11px;color:var(--color-text-primary);margin:1px 2px 1px 0;}
.tbar-wrap{margin-top:7px;}
.tbar-lbl{font-size:10px;color:var(--color-text-secondary);display:flex;justify-content:space-between;margin-bottom:2px;}
.tbar-bg{height:5px;border-radius:3px;background:var(--color-border-tertiary);}
.tbar{height:5px;border-radius:3px;transition:width .5s,background .5s;}
.queue-row{display:flex;gap:4px;flex-wrap:wrap;min-height:26px;}
.qdot{font-size:22px;}
.qdot.newq{animation:bounceIn .3s ease;}
@keyframes bounceIn{0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}}
#pizza-display{position:relative;width:180px;height:180px;margin:0 auto;}
#pc{border-radius:50%;display:block;}
#tl{position:absolute;top:0;left:0;width:180px;height:180px;pointer-events:none;}

#right{display:flex;flex-direction:column;align-items:center;gap:7px;}
#steps{display:flex;flex-direction:column;gap:6px;width:100%;max-width:310px;}
.step{background:var(--color-background-secondary);border-radius:10px;border:.5px solid var(--color-border-tertiary);padding:8px 10px;transition:opacity .2s,border-color .2s;}
.step.locked{opacity:.35;pointer-events:none;}
.step.active{opacity:1;border-color:var(--color-border-primary);}
.step.done{opacity:.65;}
.step-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--color-background-tertiary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--color-text-secondary);flex-shrink:0;}
.step.active .step-num{background:#1d4ed8;color:#fff;}
.step.done .step-num{background:#16a34a;color:#fff;}
.step-title{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.step-body{display:flex;gap:5px;flex-wrap:wrap;}
.sbtn{font-size:11px;padding:5px 9px;border:.5px solid var(--color-border-secondary);border-radius:7px;background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;transition:background .1s;}
.sbtn:hover{background:var(--color-background-secondary);}
.sbtn.active{background:#fef3c7;border-color:#f59e0b;color:#92400e;font-weight:500;}
.bbtn{font-size:11px;padding:5px 9px;border:.5px solid var(--color-border-secondary);border-radius:7px;background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;transition:background .1s;}
.bbtn:hover{background:var(--color-background-secondary);}
.bbtn.active{background:#fff7ed;border-color:#fb923c;color:#9a3412;font-weight:500;}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 4px;border:.5px solid var(--color-border-secondary);border-radius:7px;background:var(--color-background-primary);cursor:pointer;position:relative;min-width:52px;}
.tbtn:hover{background:var(--color-background-secondary);}
.tbtn:active{transform:scale(.93);}
.temo{font-size:17px;line-height:1;}
.tname{font-size:9px;color:var(--color-text-secondary);}
.tcnt{position:absolute;top:2px;right:3px;font-size:10px;font-weight:500;color:#16a34a;}
/* 토핑 빼기 버튼 */
.tremove{position:absolute;top:2px;left:3px;font-size:9px;color:#dc2626;font-weight:500;cursor:pointer;line-height:1;}

#action-row{display:flex;gap:8px;width:100%;max-width:310px;}
#serve-btn{flex:1;font-size:13px;font-weight:500;padding:9px;border:none;border-radius:8px;background:#9ca3af;color:#fff;cursor:not-allowed;transition:background .2s;}
#serve-btn.ready{background:#16a34a;cursor:pointer;}
#serve-btn.ready:hover{background:#15803d;}
#rst-btn{font-size:12px;padding:9px 14px;border:.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;}
#msg{font-size:12px;font-weight:500;min-height:20px;text-align:center;padding:3px 10px;border-radius:6px;}

.notif-wrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;}
.npop{font-size:12px;font-weight:500;padding:6px 14px;border-radius:16px;color:#fff;white-space:nowrap;animation:npopAnim 2.2s ease forwards;}
@keyframes npopAnim{0%{opacity:0;transform:translateY(-8px);}15%{opacity:1;transform:translateY(0);}78%{opacity:1;}100%{opacity:0;}}
</style>

<div id="app">
  <div id="hud">
    <span>💰 <span id="money">0</span>원</span>
    <span>😊 <span id="happy">0</span></span>
    <span>😤 <span id="angry">0</span></span>
    <span>Lv.<span id="level">1</span></span>
  </div>
  <div id="main">
    <div id="left">
      <div class="panel">
        <div class="ptitle">👤 현재 손님</div>
        <div id="cur-cust"><div style="font-size:12px;color:var(--color-text-secondary);">손님 기다리는 중...</div></div>
      </div>
      <div class="panel">
        <div class="ptitle">🕐 대기</div>
        <div class="queue-row" id="queue"></div>
      </div>
      <div id="pizza-display">
        <canvas id="pc" width="180" height="180"></canvas>
        <div id="tl"></div>
      </div>
    </div>

    <div id="right">
      <div id="steps">
        <div class="step active" id="step1">
          <div class="step-head"><div class="step-num" id="sn1">1</div><div class="step-title">🍅 소스 선택</div></div>
          <div class="step-body" id="sauce-row">
            <button class="sbtn" onclick="setSauce('tomato')" data-s="tomato">🍅 토마토</button>
            <button class="sbtn" onclick="setSauce('cream')" data-s="cream">🤍 크림</button>
            <button class="sbtn" onclick="setSauce('bbq')" data-s="bbq">🫙 BBQ</button>
            <button class="sbtn" onclick="setSauce('garlic')" data-s="garlic">🧄 갈릭</button>
          </div>
        </div>
        <div class="step locked" id="step2">
          <div class="step-head"><div class="step-num" id="sn2">2</div><div class="step-title">🧀 토핑 올리기 <span id="topping-count" style="font-size:10px;font-weight:400;color:var(--color-text-secondary);"></span></div></div>
          <div class="step-body" id="topping-grid"></div>
        </div>
        <div class="step locked" id="step3">
          <div class="step-head"><div class="step-num" id="sn3">3</div><div class="step-title">🔥 굽기</div></div>
          <div class="step-body" id="bake-row">
            <button class="bbtn" onclick="setBake('light')" data-b="light">🌕 약하게</button>
            <button class="bbtn" onclick="setBake('normal')" data-b="normal">🔥 보통</button>
            <button class="bbtn" onclick="setBake('well')" data-b="well">🌑 바삭하게</button>
          </div>
        </div>
      </div>
      <div id="action-row">
        <button id="serve-btn" onclick="servePizza()">🍕 서빙!</button>
        <button id="rst-btn" onclick="resetPizza()">🗑 초기화</button>
      </div>
      <div id="msg"></div>
    </div>
  </div>
</div>
<div class="notif-wrap" id="notif"></div>

<script>
const canvas=document.getElementById('pc');
const ctx=canvas.getContext('2d');
const CX=90,CY=90,R=80,CR=88;
const TOPPINGS=[
  {e:'🧀',n:'치즈'},{e:'🍖',n:'불고기'},{e:'🥓',n:'베이컨'},
  {e:'🍤',n:'새우'},{e:'🌽',n:'옥수수'},{e:'🍄',n:'버섯'},
  {e:'🫑',n:'파프리카'},{e:'🫒',n:'올리브'},{e:'🌶️',n:'고추'},{e:'🧅',n:'양파'}
];
const SC={tomato:'#e53e3e',cream:'#f0e9d2',bbq:'#7b3f00',garlic:'#d4a843'};
const BC={light:'#f5dfa0',normal:'#d4a043',well:'#8b5e1a'};
const BCC={light:'#e8c58a',normal:'#c47a2b',well:'#7a4010'};
const SN={tomato:'🍅 토마토',cream:'🤍 크림',bbq:'🫙 BBQ',garlic:'🧄 갈릭'};
const BN={light:'🌕 약하게',normal:'🔥 보통',well:'🌑 바삭하게'};
const MENUS=[
  {name:'마르게리타',sauce:'tomato',bake:'normal',toppings:{치즈:2},emoji:'👩'},
  {name:'불고기 피자',sauce:'tomato',bake:'normal',toppings:{치즈:1,불고기:2},emoji:'👨'},
  {name:'베이컨 크림',sauce:'cream',bake:'light',toppings:{치즈:1,베이컨:2,옥수수:1},emoji:'👧'},
  {name:'새우 갈릭',sauce:'garlic',bake:'normal',toppings:{치즈:1,새우:2},emoji:'👴'},
  {name:'버섯 BBQ',sauce:'bbq',bake:'well',toppings:{치즈:1,불고기:1,버섯:2},emoji:'👵'},
  {name:'야채 피자',sauce:'tomato',bake:'light',toppings:{치즈:1,파프리카:1,옥수수:1,양파:1},emoji:'🧑'},
  {name:'고추 불고기',sauce:'bbq',bake:'well',toppings:{치즈:1,불고기:2,고추:1},emoji:'👦'},
  {name:'올리브 크림',sauce:'cream',bake:'normal',toppings:{치즈:1,올리브:2,새우:1},emoji:'🧒'},
];

let money=0,happy=0,angry=0,level=1;
let curSauce=null,curBake=null,curToppings={};
// 단계 잠금: 0=소스, 1=토핑, 2=굽기, 3=완료
let curStep=0;
let customers=[],timers={},nextId=0,newIds=new Set(),renderedCurId=null;
let spawnTimer=null;

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function popup(txt,bg){
  const n=document.getElementById('notif');
  const d=document.createElement('div');
  d.className='npop';d.style.background=bg||'#1e293b';d.textContent=txt;
  n.appendChild(d);setTimeout(()=>d.remove(),2300);
}

function buildGrid(){
  const g=document.getElementById('topping-grid');
  g.innerHTML='';
  TOPPINGS.forEach(t=>{
    const b=document.createElement('button');
    b.className='tbtn';
    b.innerHTML=`<span class="temo">${t.e}</span><span class="tname">${t.n}</span><span class="tcnt" id="tc-${t.n}"></span><span class="tremove" id="tr-${t.n}" onclick="removeT('${t.n}',event)" style="display:none;">✕</span>`;
    b.onclick=()=>addT(t.e,t.n);
    g.appendChild(b);
  });
}

function updateStepUI(){
  // step1
  const s1=document.getElementById('step1');
  const s2=document.getElementById('step2');
  const s3=document.getElementById('step3');
  // 단계별 클래스 적용
  if(curStep===0){
    s1.className='step active';s2.className='step locked';s3.className='step locked';
  } else if(curStep===1){
    s1.className='step done';s2.className='step active';s3.className='step locked';
  } else if(curStep===2){
    s1.className='step done';s2.className='step done';s3.className='step active';
  } else {
    s1.className='step done';s2.className='step done';s3.className='step done';
  }
  // 번호 아이콘
  document.getElementById('sn1').textContent=curStep>0?'✓':'1';
  document.getElementById('sn2').textContent=curStep>1?'✓':'2';
  document.getElementById('sn3').textContent=curStep>2?'✓':'3';
  // 서빙 버튼 활성화: 손님 있고 3단계 완료 시
  const btn=document.getElementById('serve-btn');
  btn.className=curStep===3&&customers.length?'ready':'';
}

function updateToppingCounts(){
  TOPPINGS.forEach(t=>{
    const el=document.getElementById('tc-'+t.n);
    const rm=document.getElementById('tr-'+t.n);
    const cnt=curToppings[t.n]||0;
    if(el)el.textContent=cnt||'';
    if(rm)rm.style.display=cnt>0?'block':'none';
  });
  const total=Object.values(curToppings).reduce((a,b)=>a+b,0);
  document.getElementById('topping-count').textContent=total?`(${total}개)`:'';
}

// 소스 선택 → 1단계 잠금, 2단계 활성화
function setSauce(s){
  if(curStep!==0)return; // 이미 진행됐으면 변경 불가
  curSauce=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('active',b.dataset.s===s));
  drawPizza();
  // 소스 선택 즉시 다음 단계로
  curStep=1;
  updateStepUI();
}

// 토핑은 2단계에서만. 완료 버튼으로 3단계 진입
function addT(e,n){
  if(curStep!==1)return;
  if(Object.values(curToppings).reduce((a,b)=>a+b,0)>=10)return;
  curToppings[n]=(curToppings[n]||0)+1;
  const angle=Math.random()*Math.PI*2,r=Math.random()*58+10;
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${CX+r*Math.cos(angle)}px;top:${CY+r*Math.sin(angle)}px;font-size:16px;transform:translate(-50%,-50%) rotate(${rnd(-20,20)}deg);`;
  d.textContent=e;
  document.getElementById('tl').appendChild(d);
  updateToppingCounts();
  // 토핑 있으면 "다음 단계" 버튼 보여주기
  showNextToppingBtn();
}

function removeT(n,ev){
  ev.stopPropagation();
  if(curStep!==1)return;
  if(!curToppings[n])return;
  curToppings[n]--;
  if(curToppings[n]===0)delete curToppings[n];
  // 피자 토핑 레이어 재렌더
  redrawToppings();
  updateToppingCounts();
  showNextToppingBtn();
}

function redrawToppings(){
  const tl=document.getElementById('tl');
  tl.innerHTML='';
  Object.entries(curToppings).forEach(([n,cnt])=>{
    const t=TOPPINGS.find(x=>x.n===n);
    if(!t)return;
    for(let i=0;i<cnt;i++){
      const angle=Math.random()*Math.PI*2,r=Math.random()*58+10;
      const d=document.createElement('div');
      d.style.cssText=`position:absolute;left:${CX+r*Math.cos(angle)}px;top:${CY+r*Math.sin(angle)}px;font-size:16px;transform:translate(-50%,-50%) rotate(${rnd(-20,20)}deg);`;
      d.textContent=t.e;
      tl.appendChild(d);
    }
  });
}

function showNextToppingBtn(){
  // 토핑 영역에 "굽기 선택 →" 버튼 추가/제거
  let nb=document.getElementById('topping-next-btn');
  const total=Object.values(curToppings).reduce((a,b)=>a+b,0);
  if(total>0&&!nb){
    nb=document.createElement('button');
    nb.id='topping-next-btn';
    nb.className='sbtn';
    nb.style.cssText='background:#1d4ed8;color:#fff;border-color:#1d4ed8;font-weight:500;width:100%;margin-top:4px;';
    nb.textContent='굽기 선택 →';
    nb.onclick=()=>{if(curStep===1){curStep=2;updateStepUI();}};
    document.getElementById('topping-grid').after(nb);
  } else if(total===0&&nb){
    nb.remove();
  }
}

function setBake(b){
  if(curStep!==2)return; // 굽기도 딱 한 번만
  curBake=b;
  document.querySelectorAll('.bbtn').forEach(btn=>btn.classList.toggle('active',btn.dataset.b===b));
  drawPizza();
  curStep=3;
  updateStepUI();
}

function resetPizza(){
  curSauce=null;curBake=null;curToppings={};curStep=0;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tl').innerHTML='';
  const nb=document.getElementById('topping-next-btn');if(nb)nb.remove();
  updateToppingCounts();drawPizza();updateStepUI();
}

function drawPizza(){
  ctx.clearRect(0,0,180,180);
  ctx.beginPath();ctx.arc(CX,CY,CR,0,Math.PI*2);ctx.fillStyle=curBake?BCC[curBake]:'#e8c58a';ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=curBake?BC[curBake]:'#f5dfa0';ctx.fill();
  if(curSauce){ctx.beginPath();ctx.arc(CX,CY,R-5,0,Math.PI*2);ctx.fillStyle=SC[curSauce];ctx.globalAlpha=.8;ctx.fill();ctx.globalAlpha=1;}
}

function getTimeLimit(){return Math.max(25000,60000-(level-1)*5000);}
function getSpawnInterval(){return Math.max(5000,12000-(level-1)*1200);}

function scheduleSpawn(){
  clearInterval(spawnTimer);
  spawnTimer=setInterval(spawnCustomer,getSpawnInterval());
}

function spawnCustomer(){
  if(customers.length>=4)return;
  const menu=MENUS[rnd(0,MENUS.length-1)];
  const id=nextId++;
  const tl=getTimeLimit();
  customers.push({id,menu,timeLeft:tl,maxTime:tl});
  newIds.add(id);
  popup(`${menu.emoji} 새 손님! "${menu.name}" 주문!`,'#1d4ed8');
  renderQueue();
  if(renderedCurId===null)renderCurrentCard();
  updateStepUI();
  setTimeout(()=>{newIds.delete(id);},2500);
  const iv=setInterval(()=>{
    const c=customers.find(x=>x.id===id);
    if(!c){clearInterval(iv);return;}
    c.timeLeft-=500;
    if(customers[0]&&customers[0].id===id)updateTimerOnly(id);
    if(c.timeLeft<=0){clearInterval(iv);loseCustomer(id);}
  },500);
  timers[id]=iv;
}

function updateTimerOnly(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const pct=Math.max(0,c.timeLeft/c.maxTime*100);
  const bc=pct>55?'#16a34a':pct>25?'#f59e0b':'#dc2626';
  const sec=Math.ceil(c.timeLeft/1000);
  const bar=document.getElementById('tb-'+id);
  const lbl=document.getElementById('ts-'+id);
  if(bar){bar.style.width=pct+'%';bar.style.background=bc;}
  if(lbl){lbl.textContent=sec+'초';lbl.style.color=bc;}
}

function renderCurrentCard(){
  const cc=document.getElementById('cur-cust');
  if(!customers.length){
    cc.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary);">손님 기다리는 중...</div>';
    renderedCurId=null;return;
  }
  const f=customers[0];
  if(renderedCurId===f.id)return;
  renderedCurId=f.id;
  const pct=Math.max(0,f.timeLeft/f.maxTime*100);
  const bc=pct>55?'#16a34a':pct>25?'#f59e0b':'#dc2626';
  const sec=Math.ceil(f.timeLeft/1000);
  const isNew=newIds.has(f.id);
  const tpills=Object.entries(f.menu.toppings).map(([n,cnt])=>`<span class="tpill"><b>${cnt}개</b> ${n}</span>`).join('');
  cc.innerHTML=`<div class="ccard">
    <div class="cname">${f.menu.emoji} ${f.menu.name}${isNew?' <span class="nbadge">NEW</span>':''}</div>
    <div class="corder">
      <div class="crow"><span class="clabel">소스</span>${SN[f.menu.sauce]}</div>
      <div class="crow"><span class="clabel">굽기</span>${BN[f.menu.bake]}</div>
      <div class="crow"><span class="clabel">토핑</span>${tpills}</div>
    </div>
    <div class="tbar-wrap">
      <div class="tbar-lbl"><span>남은 시간</span><span id="ts-${f.id}" style="color:${bc};font-weight:500;">${sec}초</span></div>
      <div class="tbar-bg"><div class="tbar" id="tb-${f.id}" style="width:${pct}%;background:${bc};"></div></div>
    </div>
  </div>`;
}

function renderQueue(){
  document.getElementById('queue').innerHTML=customers.slice(1).map(c=>`<span class="qdot${newIds.has(c.id)?' newq':''}" title="${c.menu.name}">${c.menu.emoji}</span>`).join('');
}

function loseCustomer(id){
  clearInterval(timers[id]);
  const c=customers.find(x=>x.id===id);
  customers=customers.filter(x=>x.id!==id);
  angry++;updateHUD();
  renderedCurId=null;renderCurrentCard();renderQueue();
  updateStepUI();
  popup(`${c?c.menu.emoji:''} 손님이 화내며 가셨어요!`,'#991b1b');
  showMsg('😤 너무 오래 기다렸어요!','#dc2626','#fef2f2');
}

function updateHUD(){
  document.getElementById('money').textContent=money.toLocaleString();
  document.getElementById('happy').textContent=happy;
  document.getElementById('angry').textContent=angry;
  document.getElementById('level').textContent=level;
}

function servePizza(){
  // 버그 수정: 손님 없거나 3단계 미완성이면 서빙 불가
  if(!customers.length){showMsg('❌ 손님이 없어요!','#dc2626','#fef2f2');return;}
  if(curStep!==3){showMsg('❌ 피자를 완성해요!','#dc2626','#fef2f2');return;}
  const c=customers[0],o=c.menu;
  let ok=curSauce===o.sauce&&curBake===o.bake;
  const oK=Object.keys(o.toppings);
  if(oK.length!==Object.keys(curToppings).length)ok=false;
  else oK.forEach(k=>{if((curToppings[k]||0)!==o.toppings[k])ok=false;});
  clearInterval(timers[c.id]);
  customers=customers.filter(x=>x.id!==c.id);
  renderedCurId=null;
  if(ok){
    const earn=5000+level*500;money+=earn;happy++; // 버그수정: 맞을 때만 happy++
    popup(`${c.menu.emoji} 완벽! +${earn.toLocaleString()}원`,'#166534');
    showMsg('✅ 완벽해요! 🤤','#166534','#dcfce7');
  } else {
    money+=500; // 버그수정: 틀리면 angry++, happy 안 올림
    angry++;
    popup('⚠️ 주문이 달랐어요... -평판','#92400e');
    showMsg('⚠️ 주문이 달랐어요! +500원','#92400e','#fef3c7');
  }
  updateHUD();renderCurrentCard();renderQueue();
  const tot=happy+angry;
  if(tot>0&&tot%5===0){
    level=Math.min(level+1,8);updateHUD();
    scheduleSpawn(); // 버그수정: 레벨업 시 스폰 간격 즉시 재조정
    popup('🎉 레벨업! Lv.'+level,'#5b21b6');
  }
  resetPizza();
  updateStepUI();
}

function showMsg(t,color,bg){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.color=color||'var(--color-text-primary)';el.style.background=bg||'transparent';
  setTimeout(()=>{el.textContent='';el.style.background='transparent';},2500);
}

buildGrid();drawPizza();updateStepUI();
spawnCustomer();scheduleSpawn();
</script>
